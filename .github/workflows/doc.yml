name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Generate Documentation
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"
      - name: Build
        run: |
          swift package \
           --allow-writing-to-directory ./docs \
           generate-documentation --target SwiftACD --output-path ./docs \
           --disable-indexing \
           --transform-for-static-hosting \
           --hosting-base-path SwiftACD
      - name: Create root redirect
        run: |
          cat > ./docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta http-equiv="refresh" content="0; url=/SwiftACD/documentation/swiftacd/">
              <title>SwiftACD Documentation</title>
              <script>
                  window.location.replace("/SwiftACD/documentation/swiftacd/");
              </script>
          </head>
          <body>
              <p>Redirecting to <a href="/SwiftACD/documentation/swiftacd/">SwiftACD Documentation</a>...</p>
          </body>
          </html>
          EOF
      - name: Upload
        uses: actions/upload-pages-artifact@v5
        with:
          path: "docs/"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
